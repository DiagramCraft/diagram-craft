name: Lint

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 9.3.0
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Biome on PR
        run: |
          set +e
          pnpm exec biome lint --reporter=json --max-diagnostics=100 . > biome-pr.json
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
        id: biome_pr

      - name: Save PR warnings summary
        run: |
          if [ -f biome-pr.json ]; then
            node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('biome-pr.json', 'utf8')); fs.writeFileSync('biome-pr-summary.json', JSON.stringify({ warnings: data.summary?.warnings ?? 0, errors: data.summary?.errors ?? 0 }));"
          else
            echo '{"warnings":0,"errors":0}' > biome-pr-summary.json
          fi

      - name: Upload PR Biome artifact
        uses: actions/upload-artifact@v4
        with:
          name: biome-pr-summary
          path: biome-pr-summary.json
          retention-days: 1

      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          submodules: 'recursive'

      - name: Install dependencies on base
        run: pnpm install

      - name: Run Biome on base
        run: pnpm exec biome lint --reporter=json --max-diagnostics=100 . > biome-base.json
        continue-on-error: true

      - name: Save base warnings summary
        run: |
          if [ -f biome-base.json ]; then
            node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('biome-base.json', 'utf8')); fs.writeFileSync('biome-base-summary.json', JSON.stringify({ warnings: data.summary?.warnings ?? 0, errors: data.summary?.errors ?? 0 }));"
          else
            echo '{"warnings":0,"errors":0}' > biome-base-summary.json
          fi

      - name: Upload base Biome artifact
        uses: actions/upload-artifact@v4
        with:
          name: biome-base-summary
          path: biome-base-summary.json
          retention-days: 1

      - name: Download PR Biome artifact
        uses: actions/download-artifact@v4
        with:
          name: biome-pr-summary

      - name: Download base Biome artifact
        uses: actions/download-artifact@v4
        with:
          name: biome-base-summary

      - name: Compare Biome warnings and comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const readWarnings = path => {
              try {
                const data = JSON.parse(fs.readFileSync(path, 'utf8'));
                return {
                  warnings: data.warnings ?? 0,
                  errors: data.errors ?? 0
                };
              } catch (e) {
                console.error(`Failed to read ${path}:`, e);
                return { warnings: 0, errors: 0 };
              }
            };

            const baseSummary = readWarnings('biome-base-summary.json');
            const prSummary = readWarnings('biome-pr-summary.json');
            const baseWarnings = baseSummary.warnings;
            const prWarnings = prSummary.warnings;
            const delta = prWarnings - baseWarnings;
            const sign = delta > 0 ? '+' : '';

            const changeIndicator =
              delta > 0
                ? `🔴 ${sign}${delta}`
                : delta < 0
                  ? `🟢 ${delta}`
                  : prWarnings > 0
                    ? '🟠 0'
                    : '🟢 0';

            const statusMessage =
              delta > 0
                ? '🔴 Biome warnings increased'
                : delta < 0
                  ? '🟢 Biome warnings decreased'
                  : prWarnings > 0
                    ? '🟠 Biome warnings unchanged'
                    : '🟢 No Biome warnings';

            const comment = `## ⚠️ Biome Warnings Report

            | Metric | Base | PR | Change |
            |--------|------|----|--------|
            | **Warnings** | ${baseWarnings} | ${prWarnings} | ${changeIndicator} |

            ${statusMessage}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('⚠️ Biome Warnings Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Fail on Biome errors
        if: always()
        run: |
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('biome-pr-summary.json', 'utf8')); const errors = data.errors ?? 0; if (errors > 0) { console.error(`Biome lint reported ${errors} error(s) on the PR branch.`); process.exit(1); }"
