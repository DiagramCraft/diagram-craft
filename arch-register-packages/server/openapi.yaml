components:
  parameters:
    WorkspacePath:
      name: workspace
      in: path
      required: true
      schema:
        type: string
    WorkspaceIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
    UuidIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FilePathPath:
      name: path
      in: path
      required: true
      description: Relative project file or folder path. May contain slashes.
      schema:
        type: string

  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        statusText:
          type: string
        message:
          type: string
        data:
          $ref: '#/components/schemas/ArbitraryJson'
      additionalProperties: true

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
          const: true
        message:
          type: string
      required: [success, message]

    CountSuccessMessage:
      allOf:
        - $ref: '#/components/schemas/SuccessMessage'
        - type: object
          properties:
            count:
              type: integer
          required: [count]

    ArbitraryJson:
      oneOf:
        - type: object
          additionalProperties:
            $ref: '#/components/schemas/ArbitraryJson'
        - type: array
          items:
            $ref: '#/components/schemas/ArbitraryJson'
        - type: string
        - type: number
        - type: integer
        - type: boolean
        - type: 'null'

    Workspace:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        url_slug:
          type: string
        short_code:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, url_slug, short_code, description, created_at, updated_at]

    CreateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required: [name]
      additionalProperties: false

    UpdateWorkspaceRequest:
      $ref: '#/components/schemas/CreateWorkspaceRequest'

    WorkspaceLifecycleState:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        color:
          type: string
        sort_order:
          type: integer
      required: [id, label, color, sort_order]

    WorkspaceOwnerOption:
      type: object
      properties:
        id:
          type: string
        sort_order:
          type: integer
        color:
          type: [string, 'null']
        description:
          type: string
      required: [id, sort_order]

    WorkspaceMemberInfo:
      type: object
      properties:
        workspace:
          type: string
        user_id:
          type: string
        role:
          type: string
        display_name:
          type: string
        email:
          type: string
        created_at:
          type: string
          format: date-time
      required: [workspace, user_id, role, display_name, email, created_at]

    WorkspaceUserInfo:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        display_name:
          type: string
        auth_provider:
          type: string
        is_active:
          type: boolean
        color:
          type: [string, 'null']
      required: [id, email, display_name, auth_provider, is_active]

    TextField:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [text, longtext]
      required: [id, name, type]
      additionalProperties: false

    BooleanField:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [boolean]
      required: [id, name, type]
      additionalProperties: false

    DateField:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [date]
      required: [id, name, type]
      additionalProperties: false

    SelectOption:
      type: object
      properties:
        value:
          type: string
        label:
          type: string
      required: [value, label]
      additionalProperties: false

    SelectField:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [select]
        options:
          type: array
          items:
            $ref: '#/components/schemas/SelectOption'
      required: [id, name, type, options]
      additionalProperties: false

    ReferenceField:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [reference]
        schemaId:
          type: string
          format: uuid
        minCount:
          type: integer
        maxCount:
          type: integer
      required: [id, name, type, schemaId, minCount, maxCount]
      additionalProperties: false

    ContainmentField:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [containment]
        schemaId:
          type: string
          format: uuid
        minCount:
          type: integer
        maxCount:
          type: integer
      required: [id, name, type, schemaId, minCount, maxCount]
      additionalProperties: false

    SchemaField:
      oneOf:
        - $ref: '#/components/schemas/TextField'
        - $ref: '#/components/schemas/BooleanField'
        - $ref: '#/components/schemas/DateField'
        - $ref: '#/components/schemas/SelectField'
        - $ref: '#/components/schemas/ReferenceField'
        - $ref: '#/components/schemas/ContainmentField'

    EntitySchema:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspace:
          type: string
        name:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/SchemaField'
        color:
          type: [string, 'null']
        icon:
          type: [string, 'null']
        entity_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, workspace, name, fields, color, icon, entity_count, created_at, updated_at]

    EntitySchemaWithCount:
      allOf:
        - $ref: '#/components/schemas/EntitySchema'
        - type: object
          properties:
            entity_count:
              type: integer
          required: [entity_count]

    UpsertSchemaRequest:
      type: object
      properties:
        name:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/SchemaField'
        color:
          type: [string, 'null']
        icon:
          type: [string, 'null']
      required: [name]
      additionalProperties: false

    LifecycleStatus:
      type: string
      enum: [proposed, experimental, production, deprecated]

    EntityLink:
      type: object
      properties:
        url:
          type: string
        title:
          type: string
        type:
          type: string
      required: [url, title]
      additionalProperties: false

    EntitySummary:
      type: object
      properties:
        _uid:
          type: string
          format: uuid
        _workspace:
          type: string
        _schemaId:
          type: string
          format: uuid
        _name:
          type: string
        _slug:
          type: string
        _namespace:
          type: string
        _description:
          type: string
        _owner:
          type: [string, 'null']
        _lifecycle:
          oneOf:
            - $ref: '#/components/schemas/LifecycleStatus'
            - type: 'null'
        _tags:
          type: array
          items:
            type: string
        _links:
          type: array
          items:
            $ref: '#/components/schemas/EntityLink'
        _visibilityMode:
          type: [string, 'null']
          enum: [public, restricted, null]
        canView:
          type: boolean
        canEdit:
          type: boolean
        canDelete:
          type: boolean
        canAdmin:
          type: boolean
        canCreateChild:
          type: boolean
      required:
        - _uid
        - _workspace
        - _schemaId
        - _name
        - _slug
        - _namespace
        - _description
        - _owner
        - _lifecycle
        - _tags
        - _links
        - _visibilityMode
        - canView
        - canEdit
        - canDelete
        - canAdmin
        - canCreateChild

    EntityRecord:
      allOf:
        - $ref: '#/components/schemas/EntitySummary'
        - type: object
          additionalProperties:
            $ref: '#/components/schemas/ArbitraryJson'

