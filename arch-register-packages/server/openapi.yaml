openapi: 3.1.0
info:
  title: Arch Register API
  version: 1.0.0
  description: REST API for the Architecture Register.
servers:
  - url: http://localhost:3010
    description: Local development server
tags:
  - name: Workspaces
  - name: Schemas
  - name: Entities
  - name: Projects
  - name: Search
paths:
  /api/workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces
      operationId: listWorkspaces
      responses:
        '200':
          description: Workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Workspace'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Workspaces]
      summary: Create workspace
      operationId: createWorkspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '200':
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/workspaces/{id}:
    put:
      tags: [Workspaces]
      summary: Update workspace
      operationId: updateWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspaceIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRequest'
      responses:
        '200':
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/schemas:
    get:
      tags: [Schemas]
      summary: List schemas
      operationId: listSchemas
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
      responses:
        '200':
          description: Schemas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EntitySchemaWithCount'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Schemas]
      summary: Create schema
      operationId: createSchema
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertSchemaRequest'
      responses:
        '200':
          description: Schema created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntitySchema'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/schemas/{id}:
    get:
      tags: [Schemas]
      summary: Get schema
      operationId: getSchema
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Schema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntitySchema'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [Schemas]
      summary: Update schema
      operationId: updateSchema
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertSchemaRequest'
      responses:
        '200':
          description: Schema updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntitySchema'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Schemas]
      summary: Delete schema
      operationId: deleteSchema
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Schema deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/data:
    get:
      tags: [Entities]
      summary: List entities
      operationId: listEntities
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - name: _schemaId
          in: query
          schema:
            type: string
            format: uuid
        - name: owner
          in: query
          schema:
            type: string
        - name: lifecycle
          in: query
          schema:
            $ref: '#/components/schemas/LifecycleStatus'
        - name: q
          in: query
          description: Case-insensitive substring match on name, slug, description, owner, and tags.
          schema:
            type: string
        - name: view
          in: query
          schema:
            type: string
            enum: [full, summary]
            default: full
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Entities in either summary or full view
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: '#/components/schemas/EntitySummary'
                  - type: array
                    items:
                      $ref: '#/components/schemas/EntityRecord'
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Entities]
      summary: Create entity
      operationId: createEntity
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityWriteRequest'
      responses:
        '200':
          description: Entity created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRecord'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/data/facets:
    get:
      tags: [Entities]
      summary: Aggregate entity facets
      operationId: getEntityFacets
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
      responses:
        '200':
          description: Entity facet counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityFacets'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/data/tree:
    get:
      tags: [Entities]
      summary: Get entity tree with containment relationships
      operationId: getEntityTree
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - name: _schemaId
          in: query
          schema:
            type: string
            format: uuid
        - name: owner
          in: query
          schema:
            type: string
        - name: lifecycle
          in: query
          schema:
            $ref: '#/components/schemas/LifecycleStatus'
        - name: q
          in: query
          description: Case-insensitive substring match on name, slug, description, owner, and tags.
          schema:
            type: string
      responses:
        '200':
          description: Entity tree with nodes and edges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityTreeResponse'
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/data/export:
    get:
      tags: [Entities]
      summary: Export entities as CSV
      operationId: exportEntities
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - name: _schemaId
          in: query
          schema:
            type: string
            format: uuid
        - name: owner
          in: query
          schema:
            type: string
        - name: lifecycle
          in: query
          schema:
            $ref: '#/components/schemas/LifecycleStatus'
        - name: q
          in: query
          description: Case-insensitive substring match on name, slug, description, owner, and tags.
          schema:
            type: string
      responses:
        '200':
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/data/{id}:
    get:
      tags: [Entities]
      summary: Get entity
      operationId: getEntity
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRecord'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [Entities]
      summary: Replace entity
      operationId: updateEntity
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityWriteRequest'
      responses:
        '200':
          description: Entity updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRecord'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Entities]
      summary: Delete entity
      operationId: deleteEntity
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Entity deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/data/{id}/relations:
    get:
      tags: [Entities]
      summary: Get entity relations
      operationId: getEntityRelations
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Outgoing and incoming relations for the entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRelations'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/data/{id}/access:
    get:
      tags: [Entities]
      summary: Get entity access grants
      operationId: getEntityAccess
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Entity access configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityAccessResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [Entities]
      summary: Update entity access grants
      operationId: updateEntityAccess
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityAccessRequest'
      responses:
        '200':
          description: Entity access updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityAccessResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/data/{id}/clone:
    post:
      tags: [Entities]
      summary: Clone an entity
      operationId: cloneEntity
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Entity cloned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRecord'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/search:
    get:
      tags: [Search]
      summary: Search across projects, files, entities, and schemas
      operationId: searchWorkspace
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - name: q
          in: query
          required: true
          schema:
            type: string
        - name: limitPerType
          in: query
          schema:
            type: integer
            minimum: 0
            default: 10
        - name: types
          in: query
          description: Comma-separated list of result groups to search
          schema:
            type: string
            example: projects,files,entities,schemas
      responses:
        '200':
          description: Grouped search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/projects:
    get:
      tags: [Projects]
      summary: List projects
      operationId: listProjects
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
      responses:
        '200':
          description: Projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectWithFileCount'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [Projects]
      summary: Create project
      operationId: createProject
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProjectRequest'
      responses:
        '200':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/projects/{id}:
    get:
      tags: [Projects]
      summary: Get project with file tree
      operationId: getProject
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Project with files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetail'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [Projects]
      summary: Update project
      operationId: updateProject
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProjectRequest'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Projects]
      summary: Delete project
      operationId: deleteProject
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/projects/{id}/files:
    get:
      tags: [Projects]
      summary: List project files as a tree
      operationId: listProjectFiles
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: File tree
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileTree'
        '400':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/projects/{id}/files/{path}:
    parameters:
      - $ref: '#/components/parameters/WorkspacePath'
      - $ref: '#/components/parameters/UuidIdPath'
      - $ref: '#/components/parameters/FilePathPath'
    get:
      tags: [Projects]
      summary: Read project file JSON content
      operationId: getProjectFile
      responses:
        '200':
          description: Parsed JSON file content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbitraryJson'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [Projects]
      summary: Create or replace project file
      operationId: putProjectFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArbitraryJson'
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFile'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [Projects]
      summary: Delete project file
      operationId: deleteProjectFile
      responses:
        '200':
          description: File deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/projects/{id}/files/relocate/{path}:
    put:
      tags: [Projects]
      summary: Move or rename a project file
      operationId: relocateProjectFile
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
        - $ref: '#/components/parameters/FilePathPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelocateFileRequest'
      responses:
        '200':
          description: File relocated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectFile'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/projects/{id}/folders:
    post:
      tags: [Projects]
      summary: Create folder
      operationId: createProjectFolder
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFolderRequest'
      responses:
        '200':
          description: Folder created via .keep marker
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFolderResponse'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/projects/{id}/folders/rename:
    put:
      tags: [Projects]
      summary: Rename folder
      operationId: renameProjectFolder
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenameFolderRequest'
      responses:
        '200':
          description: Folder renamed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountSuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/projects/{id}/folders/{path}:
    delete:
      tags: [Projects]
      summary: Delete folder recursively
      operationId: deleteProjectFolder
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
        - $ref: '#/components/parameters/FilePathPath'
      responses:
        '200':
          description: Folder deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CountSuccessMessage'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'


  /api/{workspace}/templates:
    get:
      tags: [Projects]
      summary: List all templates in workspace
      operationId: listTemplates
      description: Returns all templates (workspace-level and project-level) that the user has access to
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
      responses:
        '200':
          description: Templates grouped by type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplatesResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/projects/{id}/templates:
    get:
      tags: [Projects]
      summary: List templates available for a project
      operationId: listProjectTemplates
      description: Returns workspace templates and project-specific templates
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
      responses:
        '200':
          description: Templates available for this project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectTemplatesResponse'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/{workspace}/projects/{id}/template-status/{path}:
    put:
      tags: [Projects]
      summary: Update template status for a file
      operationId: updateTemplateStatus
      description: Mark or unmark a file as a template. Workspace templates require workspace admin permissions.
      parameters:
        - $ref: '#/components/parameters/WorkspacePath'
        - $ref: '#/components/parameters/UuidIdPath'
        - $ref: '#/components/parameters/FilePathPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateStatusRequest'
      responses:
        '200':
          description: Template status updated
          content:
            application/json:
              schema:
