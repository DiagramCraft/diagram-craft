variants:
  - id: default
    name: Default
    styles:
      - id: uml-shape
        name: UML Shape
        type: node
        props: { }
      - id: uml-edge
        name: UML Edge
        type: edge
        props:
          stroke:
            color: var(--canvas-fg)
          type: orthogonal
          effects:
            rounding: true
      - id: uml-shape-text
        name: UML Shape Text
        type: text
        props: { }
      - id: uml-association
        name: UML Association
        type: edge
        props:
          stroke:
            color: var(--canvas-fg)
          type: orthogonal
          effects:
            rounding: true
      - id: uml-generalization
        name: UML Generalization
        type: edge
        props:
          arrow:
            end:
              type: SQUARE_ARROW_OUTLINE
          stroke:
            color: var(--canvas-fg)
          type: orthogonal
          effects:
            rounding: true
      - id: uml-realization
        name: UML Realization
        type: edge
        props:
          arrow:
            end:
              type: SQUARE_ARROW_OUTLINE
          stroke:
            color: var(--canvas-fg)
            pattern: DASHED
            patternSize: 50
            patternSpacing: 50
          type: orthogonal
          effects:
            rounding: true
      - id: uml-dependency
        name: UML Dependency
        type: edge
        props:
          arrow:
            end:
              type: SQUARE_STICK_ARROW
          stroke:
            color: var(--canvas-fg)
            pattern: DASHED
            patternSize: 50
            patternSpacing: 50
          type: orthogonal
          effects:
            rounding: true
      - id: uml-aggregation
        name: UML Aggregation
        type: edge
        props:
          arrow:
            end:
              type: DIAMOND_THIN_OUTLINE
              size: 150
          stroke:
            color: var(--canvas-fg)
          type: orthogonal
          effects:
            rounding: true
      - id: uml-composition
        name: UML Composition
        type: edge
        props:
          arrow:
            end:
              type: DIAMOND_THIN_FILLED
              size: 150
          stroke:
            color: var(--canvas-fg)
          fill:
            color: var(--canvas-fg)
          type: orthogonal
          effects:
            rounding: true
  - id: classic
    name: Classic
    styles:
      - id: uml-shape
        name: UML Shape
        type: node
        props:
          fill:
            color: "#fbffd0"
          stroke:
            color: "#9d3b59"
          additionalFills:
            - enabled: true
              color: "#fbffd0"
      - id: uml-edge
        name: UML Edge
        type: edge
        props:
          stroke:
            color: "#9d3b59"
          type: orthogonal
          effects:
            rounding: true
      - id: uml-shape-text
        name: UML Shape Text
        type: text
        props:
          text:
            color: black
      - id: uml-association
        name: UML Association
        type: edge
        props:
          stroke:
            color: "#9d3b59"
      - id: uml-generalization
        name: UML Generalization
        type: edge
        props:
          arrow:
            end:
              type: SQUARE_ARROW_OUTLINE
          stroke:
            color: "#9d3b59"
      - id: uml-realization
        name: UML Realization
        type: edge
        props:
          stroke:
            color: "#9d3b59"
            pattern: DASHED
            patternSize: 50
            patternSpacing: 50
          arrow:
            end:
              type: SQUARE_ARROW_OUTLINE
      - id: uml-dependency
        name: UML Dependency
        type: edge
        props:
          arrow:
            end:
              type: SQUARE_ARROW_OUTLINE
              size: 75
          stroke:
            color: "#9d3b59"
            pattern: DASHED
            patternSize: 50
            patternSpacing: 50
      - id: uml-aggregation
        name: UML Aggregation
        type: edge
        props:
          arrow:
            end:
              type: DIAMOND_THIN_OUTLINE
              size: 150
          stroke:
            color: "#9d3b59"
      - id: uml-composition
        name: UML Composition
        type: edge
        props:
          arrow:
            end:
              type: DIAMOND_THIN_FILLED
              size: 150
          fill:
            color: "#9d3b59"
          stroke:
            color: "#9d3b59"
