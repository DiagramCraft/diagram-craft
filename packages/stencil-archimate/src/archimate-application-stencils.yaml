stencils:
  - id: 'archimate-application-component'
    stencil: Component
    styles: ['archimate-application', 'archimate-application-text']
    elements:
      - id: archimate-application-component-node
        type: node
        nodeType: rect
        bounds: &archimate-application-structure-bounds
          x: 0
          y: 0
          w: 160
          h: 90
          r: 0
        children: []
        props: {}
        pickerProps: &archimate-picker-props
          stroke:
            width: 1.5
        metadata: &archimate-application-metadata
          style: archimate-application
          textStyle: archimate-application-text
        texts:
          text: "<h1>Component</h1>\n\n<p><small>&lt;&lt;Application Component&gt;&gt;</small></p>\n\n<p>Description</p>"
        tags: []

