stencils:
  - id: 'archimate-business-actor'
    stencil: Actor
    styles: ['archimate-business', 'archimate-business-text']
    elements:
      - id: archimate-business-actor-node
        type: node
        nodeType: rect
        bounds: &archimate-business-structure-bounds
          x: 0
          y: 0
          w: 160
          h: 90
          r: 0
        children: []
        props: {}
        pickerProps: &archimate-picker-props
          stroke:
            width: 1.5
        metadata: &archimate-business-metadata
          style: archimate-business
          textStyle: archimate-business-text
        texts:
          text: "<h1>Actor</h1>\n\n<p><small>&lt;&lt;Business Actor&gt;&gt;</small></p>\n\n<p>Description</p>"
        tags: []

