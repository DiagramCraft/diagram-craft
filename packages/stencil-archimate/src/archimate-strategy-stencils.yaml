stencils:
  - id: 'archimate-strategy-capability'
    name: Capability
    styles: ['archimate-strategy', 'archimate-strategy-text']
    elements:
      - id: archimate-strategy-capability-node
        type: node
        nodeType: rounded-rect
        bounds: &archimate-strategy-behavior-bounds
          x: 0
          y: 0
          w: 170
          h: 90
          r: 0
        children: []
        props:
          custom:
            roundedRect:
              radius: 14
        pickerProps: &archimate-picker-props
          stroke:
            width: 1.5
        metadata: &archimate-strategy-metadata
          style: archimate-strategy
          textStyle: archimate-strategy-text
        texts:
          text: "<h1>Capability</h1>\n\n<p><small>«Capability»</small></p>\n\n<p>Description</p>"
        tags: []

