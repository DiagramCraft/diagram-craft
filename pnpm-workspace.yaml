packages:
  - './packages/**'
  - './submodules/**'
  - './arch-register-packages/**'
  - './docs-site'

allowBuilds:
  '@openrouter/sdk': true
  '@parcel/watcher': true
  argon2: true
  better-sqlite3: true
  core-js: false
  electron: true
  electron-winstaller: true
  esbuild: true

minimumReleaseAgeExclude:
  - app-builder-lib@26.13.0
  - builder-util-runtime@9.6.3
  - builder-util@26.13.0
  - dmg-builder@26.13.0
  - electron-builder-squirrel-windows@26.13.0
  - electron-builder@26.13.0
  - electron-publish@26.13.0

overrides:
  ws: ^8.20.1
  braces: ^3.0.3
  micromatch: ^4.0.8
  nanoid: ^3.3.8
  postcss: ">=8.5.10"
  esbuild: ^0.25.0
  form-data: ">=4.0.6"
  axios: 1.16.0
  ip-address: 10.1.1
  brace-expansion: 5.0.6
  follow-redirects: ">=1.16.0"
  tar: ">=7.5.16"
  undici: 7.28.0
  "@xmldom/xmldom": 0.8.13
  "@tootallnate/once": ">=3.0.1"
  defu: ">=6.1.6"
  lodash: ">=4.18.1"
  lodash-es: ">=4.18.1"
