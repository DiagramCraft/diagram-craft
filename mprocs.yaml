procs:
  "DC web :5173":
    shell: |
      PORT=5173 pnpm client:dev
    stop: SIGKILL
    log:
      file: dc-web.log
  "DC server :3000":
    shell: |
      cd packages/server-main && \
      pnpm run dev --data-dir ./data --fs-root ../main/public --bootstrap-data /Users/magnusjohansson/Documents/Private/projects/diagram-craft/packages/main/public/data/dataset1/data.json --bootstrap-schemas /Users/magnusjohansson/Documents/Private/projects/diagram-craft/packages/main/public/data/dataset1/schemas.json
    stop: SIGKILL
    log:
      file: dc-web.log
  "AR web :5174":
    shell: |
      cd arch-register-packages/web && \
      PORT=5174 pnpm dev
    stop: SIGKILL
    log:
      file: ar-web.log
  "AR server :3010":
    shell: |
      cd arch-register-packages/server && \
      pnpm dev
    stop: SIGTERM
    log:
      file: ar-server.log
  "AR job server":
    shell: |
      cd arch-register-packages/job-server && \
      JOB_SERVER_ID=local \
      JOB_SERVER_NAME="Local job server" \
      DOTENV_CONFIG_PATH=../server/.env \
      pnpm dev
    autostart: false
    stop: SIGTERM
    log:
      file: ar-job-server.log

  "Webhook test :3020":
    shell: |
      PORT=3020 pnpm --filter @arch-register/webhook-test-server dev
    autostart: false
    stop: SIGTERM
    log:
      file: webhook-test.log

  "Storybook :6006":
    cwd: "packages/main"
    shell: |
      pnpm storybook
    autostart: false
    stop: SIGKILL
    log:
      file: storybook.log

  "AR Storybook :6007":
    cwd: "arch-register-packages/web"
    shell: |
      pnpm storybook
    autostart: false
    stop: SIGKILL
    log:
      file: ar-storybook.log

  "Docs :3001":
    shell: |
      pnpm docs:dev --port 3001 --no-open
    autostart: false
    stop: SIGKILL
    log:
      file: docs.log

proc_log:
  dir: .logs
  mode: truncate
